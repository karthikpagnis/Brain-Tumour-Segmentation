version: '3.8'

services:
  # API Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: brain-tumor-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DEVICE=cuda  # Change to 'cpu' if GPU not available
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./outputs:/app/outputs
      - ./data:/app/data
    networks:
      - brain-tumor-network
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Frontend UI Service (React)
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: brain-tumor-ui
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - NODE_ENV=production
    volumes:
      - ./ui/src:/app/src
    networks:
      - brain-tumor-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Database Service (for future use - metrics, logs, etc.)
  db:
    image: postgres:15-alpine
    container_name: brain-tumor-db
    environment:
      POSTGRES_DB: brain_tumor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - brain-tumor-network
    restart: unless-stopped
    # Uncomment to expose for external access (not recommended for production)
    # ports:
    #   - "5432:5432"

  # Jupyter Lab Service (for research/development)
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
      target: jupyter
    container_name: brain-tumor-jupyter
    ports:
      - "8888:8888"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./:/app
      - ./experiments:/app/experiments
    networks:
      - brain-tumor-network
    restart: unless-stopped
    # Run only on demand by uncommenting
    # profiles:
    #   - dev

  # Redis Cache Service (for future use - API caching)
  cache:
    image: redis:7-alpine
    container_name: brain-tumor-cache
    networks:
      - brain-tumor-network
    restart: unless-stopped
    # Uncomment to expose if needed
    # ports:
    #   - "6379:6379"

networks:
  brain-tumor-network:
    driver: bridge

volumes:
  db_data:
    driver: local
